<footer class="footer">
  <div class="grid">
    @for (col of [1, 2, 3]; track col) {
      <section class="col">
        <h2 class="col-title">Title</h2>
        <ul class="links">
          @for (i of [1, 2, 3, 4, 5, 6]; track i) {
            <li><a href="#">Content</a></li>
          }
        </ul>
      </section>
    }

    <section class="col col-aside">
      <h2 class="col-title">Síguenos en</h2>
      <div class="social">
        <a class="social-btn" href="#" aria-label="Facebook">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M14 8H16V5H14C11.8 5 10 6.8 10 9V11H8V14H10V19H13V14H15.5L16 11H13V9C13 8.4 13.4 8 14 8Z"
              fill="currentColor"
            />
          </svg>
        </a>
        <a class="social-btn" href="#" aria-label="Instagram">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <rect x="4" y="4" width="16" height="16" rx="5" stroke="currentColor" stroke-width="2" />
            <circle cx="12" cy="12" r="3.5" stroke="currentColor" stroke-width="2" />
            <circle cx="17.4" cy="6.6" r="1" fill="currentColor" />
          </svg>
        </a>
      </div>

      <h2 class="col-title mt">Libro de reclamaciones</h2>
      <a class="libro" href="#" aria-label="Libro de reclamaciones">
        <img
          src="/images/book-reclamation.png"
          alt="Libro de reclamaciones"
          class="book-img"
          width="157"
          height="79"
          loading="lazy"
        />
      </a>

      <h2 class="col-title mt">Descarga nuestra app en</h2>
      <div class="stores">
        <a class="store-pill" href="#" aria-label="Google Play">
          <img
            src="/images/google-play.png"
            alt="Google Play"
            class="store-img"
            width="182"
            height="63"
            loading="lazy"
          />
        </a>
        <a class="store-pill" href="#" aria-label="App Store">
          <img
            src="/images/app-store.png"
            alt="App Store"
            class="store-img"
            width="182"
            height="63"
            loading="lazy"
          />
        </a>
      </div>
    </section>
  </div>

  <div class="bar">
    <p>Copyright &copy; Inkafarma 2026 Todos los derechos reservados</p>
  </div>
</footer>
