# Despliegue: desde esta carpeta, con build ya generado:
#   npm run build && gcloud app deploy
#
# Ajusta `service` si ya usas ese nombre en el proyecto.
runtime: nodejs22
service: web-farmacias
env: standard
instance_class: F1

handlers:
  - url: .*
    script: auto

automatic_scaling:
  min_instances: 0
  max_instances: 5
  target_cpu_utilization: 0.65
